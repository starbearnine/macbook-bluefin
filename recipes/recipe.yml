name: macbook-bluefin
description: Custom Bluefin with Broadcom Drivers
base-image: ghcr.io/ublue-os/bluefin
image-version: latest

modules:
  - type: script
    snippets:
      - "rpm-ostree install https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm"
      - "rpm-ostree install --enablerepo=rpmfusion-nonfree --enablerepo=rpmfusion-nonfree-updates akmod-wl broadcom-wl"
